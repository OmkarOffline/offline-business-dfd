<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Artium Academy — Offline Centres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--white:#FFFFFF;--alt:#F1F5F9;
  --border:#E2E8F0;--border-h:#CBD5E1;
  --r:20px;--shadow:0 12px 40px rgba(15,23,42,0.08);--shadow-h:0 20px 60px rgba(15,23,42,0.13);
  --hero:#0F172A;--h1:#17213C;--h2:#1E293B;--h3:#334155;
  --body:#475569;--sec:#64748B;--meta:#94A3B8;
  --success:#10B981;--warn:#F59E0B;--danger:#EF4444;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh}
.page{display:none;min-height:100vh;flex-direction:column}.page.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--meta);letter-spacing:.08em;text-transform:uppercase}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:30px;border:1.5px solid var(--border-h);background:var(--white);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--h3);transition:all .18s}
.back-btn:hover{background:var(--alt);border-color:var(--h3);color:var(--h1)}
.fn-badge{display:flex;align-items:center;gap:8px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;color:var(--h1)}
.fn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.p1-body{padding:32px;flex:1}
.p1-eyebrow{font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--meta);margin-bottom:24px}
.fn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:880px}
.fn-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:28px 24px 22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s,border-color .22s}
.fn-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-h);border-color:var(--border-h)}
.fn-top-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.fn-icon{width:88px;height:88px;object-fit:contain;margin-bottom:18px;display:block}
.fn-name{font-family:'Manrope',sans-serif;font-size:19px;font-weight:800;color:var(--h1);line-height:1.2;margin-bottom:4px;letter-spacing:-.03em}
.fn-sub-count{font-size:12px;color:var(--meta);font-weight:500;margin-bottom:18px}
.fn-bar-track{height:4px;border-radius:4px;background:var(--alt);overflow:hidden;margin-bottom:10px}
.fn-bar-fill{height:4px;border-radius:4px;width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.fn-foot{display:flex;align-items:center;justify-content:space-between}
.fn-pct{font-family:'Manrope',sans-serif;font-size:13px;font-weight:700}
.fn-arrow{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--alt);color:var(--meta);transition:all .2s}
.fn-card:hover .fn-arrow{transform:translateX(3px)}
.p2-body{padding:24px 32px 64px;flex:1;max-width:920px}
.p2-hdr{display:flex;align-items:center;gap:16px;padding:20px 24px 20px 28px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:20px;position:relative;overflow:hidden}
.p2-hdr-bar{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:var(--r) 0 0 var(--r)}
.p2-icon{width:64px;height:64px;object-fit:contain;flex-shrink:0;border-radius:14px}
.p2-info{flex:1}
.p2-name{font-family:'Manrope',sans-serif;font-size:26px;font-weight:900;color:var(--h1);letter-spacing:-.04em;margin-bottom:3px}
.p2-meta{font-size:13px;color:var(--meta);font-weight:500}
.p2-pill{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;padding:5px 14px;border-radius:30px;flex-shrink:0}
/* TREE L1 */
.tree-l1{background:var(--white);border:1.5px solid var(--border);border-radius:16px;margin-bottom:8px;overflow:hidden;position:relative;transition:border-color .18s,box-shadow .18s}
.tree-l1:hover{border-color:var(--border-h)}
.tree-l1.expanded{border-color:var(--border-h)}
.l1-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:16px 0 0 16px;opacity:0;transition:opacity .18s}
.tree-l1:hover .l1-bar,.tree-l1.expanded .l1-bar{opacity:1}
.l1-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.l1-head:hover{background:var(--alt)}
.l1-ew{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:transform .18s}
.tree-l1:hover .l1-ew{transform:scale(1.08)}
.l1-info{flex:1;min-width:0}
.l1-name{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--h1);margin-bottom:5px;letter-spacing:-.02em}
.l1-meta{display:flex;align-items:center;gap:8px}
.prog-bar-sm{height:3px;border-radius:3px;background:var(--alt);overflow:hidden;flex-shrink:0}
.w72{width:72px}.w56{width:56px}.w44{width:44px}
.prog-fill{height:100%;border-radius:3px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.l1-pct{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700}
.l1-cnt{font-size:11px;color:var(--meta);margin-left:auto}
.l1-icon{font-size:18px;color:var(--meta);transition:transform .22s;flex-shrink:0}
.tree-l1.expanded .l1-icon.expand{transform:rotate(180deg)}
.l1-children{display:none;padding:0 12px 12px}
.tree-l1.expanded .l1-children{display:block}
/* TREE L2 */
.tree-l2{background:var(--alt);border:1.5px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;position:relative;transition:all .18s}
.tree-l2:last-child{margin-bottom:0}
.tree-l2:hover{border-color:var(--border-h);background:var(--white)}
.tree-l2.expanded{border-color:var(--border-h);background:var(--white)}
.l2-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.l2-head:hover{background:rgba(241,245,249,0.7)}
.l2-ew{font-size:16px;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:transform .18s}
.tree-l2:hover .l2-ew{transform:scale(1.08)}
.l2-info{flex:1;min-width:0}
.l2-name{font-family:'Manrope',sans-serif;font-size:13.5px;font-weight:700;color:var(--h2);margin-bottom:4px;letter-spacing:-.015em}
.l2-meta{display:flex;align-items:center;gap:7px}
.l2-pct{font-family:'Manrope',sans-serif;font-size:11px;font-weight:700}
.l2-cnt{font-size:10px;color:var(--meta);margin-left:auto}
.l2-icon{font-size:16px;color:var(--meta);transition:transform .22s;flex-shrink:0}
.tree-l2.expanded .l2-icon.expand{transform:rotate(180deg)}
.l2-children{display:none;padding:0 10px 10px}
.tree-l2.expanded .l2-children{display:block}
/* TREE L3 */
.tree-l3{background:var(--white);border:1.5px solid var(--border);border-radius:10px;margin-bottom:5px;overflow:hidden;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px;padding:10px 12px}
.tree-l3:last-child{margin-bottom:0}
.tree-l3:hover{border-color:var(--border-h);background:#FAFBFC;box-shadow:0 2px 8px rgba(15,23,42,0.05)}
.l3-ew{font-size:14px;flex-shrink:0}
.l3-name{font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:700;color:var(--h3);flex:1}
.l3-bar-bg{width:40px;height:2.5px;border-radius:3px;background:var(--border);overflow:hidden;flex-shrink:0}
.l3-bar-fill{height:2.5px;border-radius:3px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.l3-pct{font-family:'Manrope',sans-serif;font-size:10px;font-weight:700;min-width:26px;text-align:right}
.l3-cnt{font-size:9px;color:var(--meta);margin-left:3px}
.l3-arr{font-size:13px;color:var(--meta);margin-left:4px;flex-shrink:0}
/* PANEL */
.panel-wrap{position:fixed;inset:0;z-index:200;pointer-events:none}
.panel-wrap.open{pointer-events:all}
.panel-scrim{position:absolute;inset:0;background:rgba(15,23,42,0);transition:background .28s}
.panel-wrap.open .panel-scrim{background:rgba(15,23,42,0.3)}
.panel{position:absolute;top:0;right:0;bottom:0;width:50%;background:var(--white);border-left:1.5px solid var(--border);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;box-shadow:-20px 0 60px rgba(15,23,42,0.12)}
.panel-wrap.open .panel{transform:translateX(0)}
.panel-hdr{padding:28px 32px 22px;border-bottom:1.5px solid var(--border);position:relative;flex-shrink:0}
.panel-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px 4px 8px;border-radius:30px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;margin-bottom:12px;letter-spacing:.02em}
.panel-ttl{font-family:'Manrope',sans-serif;font-size:24px;font-weight:800;color:var(--h1);margin-bottom:16px;line-height:1.2;letter-spacing:-.04em}
.panel-prog-row{display:flex;align-items:center;gap:12px}
.panel-prog-bg{flex:1;height:7px;border-radius:7px;background:var(--alt);overflow:hidden}
.panel-prog-fill{height:7px;border-radius:7px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.panel-prog-lbl{font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;min-width:44px;text-align:right}
.panel-close{position:absolute;top:24px;right:24px;width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--alt);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sec);font-size:16px;transition:all .18s}
.panel-close:hover{background:var(--border);color:var(--h1)}
.panel-legend{display:flex;align-items:center;gap:12px;padding:10px 32px;border-bottom:1px solid var(--border);background:var(--alt)}
.leg-lbl{font-size:10px;color:var(--meta);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.leg-chip{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sec);font-weight:600}
.leg-sw{width:11px;height:11px;border-radius:3px}
.panel-body{flex:1;overflow-y:auto;padding:20px 32px 32px}
.panel-body::-webkit-scrollbar{width:5px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
.panel-empty{text-align:center;padding:56px 20px;color:var(--meta);font-size:14px;line-height:1.7}
.ep-icon{font-size:36px;display:block;margin-bottom:14px;opacity:.3}
/* INITIATIVE CARDS */
.ic{border-radius:16px;margin-bottom:12px;overflow:hidden;cursor:pointer;position:relative;border:1.5px solid;transition:box-shadow .18s,transform .15s}
.ic:last-child{margin-bottom:0}
.ic:hover{transform:translateX(-2px);box-shadow:0 8px 24px rgba(15,23,42,0.1)}
.ic.t-r{background:linear-gradient(135deg,#FFF3F1,#FFF9F8);border-color:#F5C5C0}
.ic.t-a{background:linear-gradient(135deg,#FFFBEE,#FFFEF8);border-color:#F0D97A}
.ic.t-g{background:linear-gradient(135deg,#EDFBF4,#F5FDF9);border-color:#8ED9B4}
.ic-top{padding:18px 20px 14px}
.ic-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.ic-name{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;color:var(--h1);line-height:1.4;flex:1;letter-spacing:-.02em}
.ic-pill{font-family:'Manrope',sans-serif;font-size:10px;font-weight:800;padding:4px 10px;border-radius:30px;white-space:nowrap;flex-shrink:0;margin-top:2px;letter-spacing:.03em}
.ic-bar-bg{height:5px;border-radius:5px;background:rgba(15,23,42,0.07);overflow:hidden}
.ic-bar-fill{height:5px;border-radius:5px}
.ic-chev{position:absolute;right:16px;top:16px;font-size:15px;color:var(--meta);transition:transform .22s}
.ic.open .ic-chev{transform:rotate(180deg)}
.ic-det{display:none;padding:14px 20px 20px;border-top:1px solid rgba(15,23,42,0.07)}
.ic.open .ic-det{display:block}
.ic.t-r .ic-det{background:rgba(255,220,215,0.3)}
.ic.t-a .ic-det{background:rgba(255,238,190,0.3)}
.ic.t-g .ic-det{background:rgba(200,245,220,0.3)}
.det-sec{margin-bottom:14px}.det-sec:last-child{margin-bottom:0}
.det-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--meta);margin-bottom:8px}
.det-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:7px}.det-item:last-child{margin-bottom:0}
.det-dot{width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.det-txt{font-size:13.5px;color:var(--body);line-height:1.65}
.cb{display:flex;align-items:center;gap:7px;padding:9px 20px;background:rgba(16,185,129,0.09);border-top:1px solid rgba(16,185,129,0.2);font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;color:#065F46}
.dep{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:2px;transition:transform .18s}
.dep:hover{transform:scale(1.25)}
.dep.mo{background:rgba(245,158,11,0.14);border:1.5px solid rgba(245,158,11,0.45)}.dep.mo i{font-size:12px;color:#B45309}
.dep.ch{background:rgba(79,156,249,0.12);border:1.5px solid rgba(79,156,249,0.42)}.dep.ch i{font-size:12px;color:#1D5EC0}
.tt{position:fixed;z-index:999;background:var(--h1);color:#fff;font-size:12px;font-weight:500;padding:8px 14px;border-radius:10px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:280px;white-space:normal;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,0.22)}
.tt.on{opacity:1}
.tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--h1)}
</style>
</head>
<body>
<div class="tt" id="tt"></div>
<div class="page active" id="p1">
  <div class="topbar"><span class="topbar-title">Artium Academy — Offline Centres</span></div>
  <div class="p1-body">
    <div class="p1-eyebrow">Business Functions</div>
    <div class="fn-grid" id="fg"></div>
  </div>
</div>
<div class="page" id="p2">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left"></i> All functions</button>
      <div class="fn-badge" id="p2b"></div>
    </div>
  </div>
  <div class="p2-body" id="p2bd"></div>
</div>
<div class="panel-wrap" id="pw">
  <div class="panel-scrim" onclick="closePanel()"></div>
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-chip" id="pc"></div>
      <div class="panel-ttl" id="pt"></div>
      <div class="panel-prog-row">
        <div class="panel-prog-bg"><div class="panel-prog-fill" id="ppf"></div></div>
        <div class="panel-prog-lbl" id="ppl"></div>
      </div>
      <button class="panel-close" onclick="closePanel()"><i class="ti ti-x"></i></button>
    </div>
    <div class="panel-legend">
      <span class="leg-lbl">Progress</span>
      <div class="leg-chip"><div class="leg-sw" style="background:#EF4444"></div>0–40%</div>
      <div class="leg-chip"><div class="leg-sw" style="background:#F59E0B"></div>41–70%</div>
      <div class="leg-chip"><div class="leg-sw" style="background:#10B981"></div>71–100%</div>
    </div>
    <div class="panel-body" id="pb"></div>
  </div>
</div>

    {n:"Learner-facing features & tools",e:"📲",i:[]},
  ]},
  {n:"Social Media, Design & Content",k:"sm",s:[
    {n:"Social media strategy",e:"📸",i:[]},
    {n:"Content strategy",e:"✍️",i:[]},
    {n:"Design strategy",e:"🎨",i:[]},
  ]},
];

const ttEl=document.getElementById("tt");let ttT;
function showTT(el,txt){clearTimeout(ttT);ttEl.textContent=txt;ttEl.classList.add("on");requestAnimationFrame(()=>{const r=el.getBoundingClientRect(),tw=ttEl.offsetWidth,th=ttEl.offsetHeight;let l=r.left+r.width/2-tw/2;l=Math.max(6,Math.min(l,window.innerWidth-tw-6));ttEl.style.left=l+"px";ttEl.style.top=(r.top-9-th)+"px"});}
function hideTT(){ttT=setTimeout(()=>ttEl.classList.remove("on"),110);}

function buildP1(){
  const g=document.getElementById("fg");g.innerHTML="";
  D.forEach((fn,fi)=>{
    const c=C[fn.k],fa=avgN(fn);
    const card=document.createElement("div");card.className="fn-card";
    const bar=document.createElement("div");bar.className="fn-top-bar";bar.style.background=c.a;card.appendChild(bar);
    const ico=mkImg(fn.k,88);ico.className="fn-icon";card.appendChild(ico);
    const nm=document.createElement("div");nm.className="fn-name";nm.textContent=fn.n;card.appendChild(nm);
    const cnt=document.createElement("div");cnt.className="fn-sub-count";cnt.textContent=fn.s.length?fn.s.length+" sub-functions":"Coming soon";card.appendChild(cnt);
    const track=document.createElement("div");track.className="fn-bar-track";
    const fill=document.createElement("div");fill.className="fn-bar-fill";fill.dataset.v=fa;fill.style.background=bC(fa);
    track.appendChild(fill);card.appendChild(track);
    const foot=document.createElement("div");foot.className="fn-foot";
    const pct=document.createElement("span");pct.className="fn-pct";pct.style.color=c.a;pct.textContent=pT(fa);
    const arr=document.createElement("div");arr.className="fn-arrow";arr.style.color=c.a;arr.innerHTML='<i class="ti ti-arrow-right"></i>';
    foot.appendChild(pct);foot.appendChild(arr);card.appendChild(foot);
    card.addEventListener("mouseenter",()=>{card.style.boxShadow=`0 20px 60px ${c.a}22,0 4px 20px rgba(15,23,42,0.08)`;card.style.borderColor=c.a+"40"});
    card.addEventListener("mouseleave",()=>{card.style.boxShadow="";card.style.borderColor=""});
    card.addEventListener("click",()=>goFn(fi));
    g.appendChild(card);
  });
  setTimeout(()=>document.querySelectorAll(".fn-bar-fill").forEach(el=>el.style.width=el.dataset.v+"%"),160);
}

function goFn(fi){
  const fn=D[fi],c=C[fn.k],fa=avgN(fn),pp=pPill(fa);
  document.getElementById("p2b").innerHTML=`<div class="fn-dot" style="background:${c.a}"></div><span>${fn.n}</span>`;
  const bd=document.getElementById("p2bd");bd.innerHTML="";
  const hdr=document.createElement("div");hdr.className="p2-hdr";
  const hbar=document.createElement("div");hbar.className="p2-hdr-bar";hbar.style.background=c.a;hdr.appendChild(hbar);
  const ico=mkImg(fn.k,64);ico.className="p2-icon";hdr.appendChild(ico);
  const info=document.createElement("div");info.className="p2-info";
  info.innerHTML=`<div class="p2-name">${fn.n}</div><div class="p2-meta">${fn.s.length} sub-functions</div>`;hdr.appendChild(info);
  const pill=document.createElement("span");pill.className="p2-pill";pill.style.cssText=`background:${pp.bg};color:${pp.c}`;pill.textContent=pT(fa);hdr.appendChild(pill);
  bd.appendChild(hdr);
  if(!fn.s.length){
    const ph=document.createElement("div");ph.style.cssText="text-align:center;padding:56px 16px;color:#94A3B8;font-size:14px;line-height:1.7";
    ph.innerHTML=`<i class="ti ti-clipboard-list" style="font-size:36px;display:block;margin-bottom:14px;opacity:.3"></i>Brief coming soon.<br>Sub-functions will appear here once briefed.`;
    bd.appendChild(ph);
  } else {
    fn.s.forEach((sub,si)=>renderL1(bd,fn,sub,c,fi,si));
  }
  setTimeout(()=>animateBars(bd),160);
  document.getElementById("p1").classList.remove("active");document.getElementById("p2").classList.add("active");window.scrollTo(0,0);
}

function animateBars(root){root.querySelectorAll("[data-v]").forEach(el=>el.style.width=el.dataset.v+"%");}

function renderL1(bd,fn,sub,c,fi,si){
  const hasKids=sub.kids&&sub.kids.length;
  const sp=avgN(sub);
  const card=document.createElement("div");card.className="tree-l1";
  const lbar=document.createElement("div");lbar.className="l1-bar";lbar.style.background=c.a;card.appendChild(lbar);
  const head=document.createElement("div");head.className="l1-head";
  const ew=document.createElement("div");ew.className="l1-ew";ew.style.background=c.bg;ew.textContent=sub.e||"📁";head.appendChild(ew);
  const info=document.createElement("div");info.className="l1-info";
  const nm=document.createElement("div");nm.className="l1-name";nm.textContent=sub.n;info.appendChild(nm);
  const meta=document.createElement("div");meta.className="l1-meta";
  const pbar=document.createElement("div");pbar.className="prog-bar-sm w72";
  const pf=document.createElement("div");pf.className="prog-fill";pf.dataset.v=sp;pf.style.background=bC(sp);
  pbar.appendChild(pf);meta.appendChild(pbar);
  const pctS=document.createElement("span");pctS.className="l1-pct";pctS.style.color=bC(sp);pctS.textContent=pT(sp);meta.appendChild(pctS);
  const cntS=document.createElement("span");cntS.className="l1-cnt";
  cntS.textContent=hasKids?sub.kids.length+" sub-section"+(sub.kids.length>1?"s":""):sub.i&&sub.i.length?sub.i.length+" initiative"+(sub.i.length>1?"s":""):"No initiatives yet";
  meta.appendChild(cntS);info.appendChild(meta);head.appendChild(info);
  const icoEl=document.createElement("i");
  icoEl.className=hasKids?"ti ti-chevron-down l1-icon expand":"ti ti-arrow-right l1-icon leaf";
  head.appendChild(icoEl);card.appendChild(head);
  if(!hasKids){
    head.addEventListener("click",()=>openPanel(fn,sub,c));
  } else {
    const kids=document.createElement("div");kids.className="l1-children";
    sub.kids.forEach((kid,ki)=>renderL2(kids,fn,kid,c,fi,si,ki));
    card.appendChild(kids);
    head.addEventListener("click",()=>{card.classList.toggle("expanded");if(card.classList.contains("expanded"))setTimeout(()=>animateBars(kids),45);});
  }
  bd.appendChild(card);
}

function renderL2(container,fn,kid,c,fi,si,ki){
  const hasKids=kid.kids&&kid.kids.length;
  const kp=avgN(kid);
  const card=document.createElement("div");card.className="tree-l2";
  const head=document.createElement("div");head.className="l2-head";
  const ew=document.createElement("div");ew.className="l2-ew";ew.style.background=c.bg;ew.textContent=kid.e||"📂";head.appendChild(ew);
  const info=document.createElement("div");info.className="l2-info";
  const nm=document.createElement("div");nm.className="l2-name";nm.textContent=kid.n;info.appendChild(nm);
  const meta=document.createElement("div");meta.className="l2-meta";
  const pbar=document.createElement("div");pbar.className="prog-bar-sm w56";
  const pf=document.createElement("div");pf.className="prog-fill";pf.dataset.v=kp;pf.style.background=bC(kp);
  pbar.appendChild(pf);meta.appendChild(pbar);
  const pctS=document.createElement("span");pctS.className="l2-pct";pctS.style.color=bC(kp);pctS.textContent=pT(kp);meta.appendChild(pctS);
  const cntS=document.createElement("span");cntS.className="l2-cnt";
  cntS.textContent=hasKids?kid.kids.length+" sections":kid.i&&kid.i.length?kid.i.length+" initiative"+(kid.i.length>1?"s":""):"No initiatives yet";
  meta.appendChild(cntS);info.appendChild(meta);head.appendChild(info);
  const icoEl=document.createElement("i");
  icoEl.className=hasKids?"ti ti-chevron-down l2-icon expand":"ti ti-arrow-right l2-icon leaf";
  head.appendChild(icoEl);card.appendChild(head);
  if(!hasKids){
    head.addEventListener("click",()=>openPanel(fn,kid,c));
  } else {
    const kids=document.createElement("div");kids.className="l2-children";
    kid.kids.forEach(gk=>renderL3(kids,fn,gk,c));
    card.appendChild(kids);
    head.addEventListener("click",()=>{card.classList.toggle("expanded");if(card.classList.contains("expanded"))setTimeout(()=>animateBars(kids),45);});
  }
  container.appendChild(card);
}

function renderL3(container,fn,gk,c){
  const gp=avgN(gk);
  const card=document.createElement("div");card.className="tree-l3";
  card.innerHTML=`<span class="l3-ew">${gk.e||"📌"}</span><span class="l3-name">${gk.n}</span><div class="l3-bar-bg"><div class="l3-bar-fill" data-v="${gp}" style="background:${bC(gp)}"></div></div><span class="l3-pct" style="color:${bC(gp)}">${pT(gp)}</span><span class="l3-cnt">${gk.i&&gk.i.length?gk.i.length+"i":""}</span><i class="ti ti-arrow-right l3-arr"></i>`;
  card.addEventListener("click",()=>openPanel(fn,gk,c));
  container.appendChild(card);
}

function goHome(){closePanel();document.getElementById("p2").classList.remove("active");document.getElementById("p1").classList.add("active");window.scrollTo(0,0);}

function mkDep(type,id,txt){
  const el=document.createElement("div");el.className=`dep ${type}`;
  el.innerHTML=type==="mo"?`<i class="ti ti-crown"></i>`:`<i class="ti ti-git-branch"></i>`;
  el.addEventListener("mouseenter",()=>showTT(el,txt));el.addEventListener("mouseleave",hideTT);
  return el;
}

function openPanel(fn,node,c){
  const sp=node.i&&node.i.length?avg(node.i):0;
  const pp=pPill(sp);
  const pc=document.getElementById("pc");
  pc.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c.a};display:inline-block;flex-shrink:0"></span><span style="margin-left:5px">${fn.n}</span>`;
  pc.style.cssText=`background:${c.bg};border:1.5px solid ${c.a}30;color:${c.pc};font-family:Manrope,sans-serif`;
  document.getElementById("pt").textContent=(node.e?node.e+" ":"")+node.n;
  const pf=document.getElementById("ppf");pf.style.width="0";pf.style.background=bC(sp);setTimeout(()=>pf.style.width=sp+"%",70);
  const lbl=document.getElementById("ppl");lbl.textContent=pT(sp);lbl.style.color=bC(sp);
  const pb=document.getElementById("pb");
  if(!node.i||!node.i.length){
    pb.innerHTML=`<div class="panel-empty"><i class="ti ti-clipboard-list ep-icon"></i>No initiatives logged yet.<br>Keep briefing to fill this in.</div>`;
    document.getElementById("pw").classList.add("open");return;
  }
  pb.innerHTML="";
  node.i.forEach(init=>{
    const pp2=pPill(init.pct),isC=init.pct===100;
    const card=document.createElement("div");card.className=`ic ${tC(init.pct)}`;card.style.position="relative";
    const top=document.createElement("div");top.className="ic-top";
    const row=document.createElement("div");row.className="ic-row";
    const nm=document.createElement("div");nm.className="ic-name";nm.textContent=init.n;row.appendChild(nm);
    if(init.rb)init.rb.forEach(id=>{const d=DEPS[id];row.appendChild(mkDep("mo",id,`Mother task — required by: ${d?d.lbl:id}`))});
    if(init.do)init.do.forEach(id=>{const d=DEPS[id];row.appendChild(mkDep("ch",id,`Child task — depends on: ${d?d.lbl:id}`))});
    const pill=document.createElement("div");pill.className="ic-pill";pill.style.cssText=`background:${pp2.bg};color:${pp2.c}`;pill.textContent=pT(init.pct);row.appendChild(pill);
    top.appendChild(row);
    const bb=document.createElement("div");bb.className="ic-bar-bg";
    const bf=document.createElement("div");bf.className="ic-bar-fill";bf.style.cssText=`width:${init.pct}%;background:${bC(init.pct)}`;bb.appendChild(bf);top.appendChild(bb);
    card.appendChild(top);
    if(isC){const cb=document.createElement("div");cb.className="cb";cb.innerHTML=`<i class="ti ti-circle-check"></i> Complete`;card.appendChild(cb);}
    const det=document.createElement("div");det.className="ic-det";
    const dH=init.d&&init.d.length?`<div class="det-sec"><div class="det-lbl">✅ What's been done</div>${init.d.map(d=>`<div class="det-item"><div class="det-dot" style="background:#10B981"></div><div class="det-txt">${d}</div></div>`).join("")}</div>`:"";
    const pH=init.x&&init.x.length?`<div class="det-sec"><div class="det-lbl">🔲 What's pending</div>${init.x.map(p=>`<div class="det-item"><div class="det-dot" style="background:#F59E0B"></div><div class="det-txt">${p}</div></div>`).join("")}</div>`:"";
    det.innerHTML=dH+(pH||(!isC?'<div class="det-sec"><div class="det-lbl">Nothing pending</div></div>':""));
    card.appendChild(det);
    const chev=document.createElement("i");chev.className="ti ti-chevron-down ic-chev";card.appendChild(chev);
    card.addEventListener("click",e=>{if(e.target.closest(".dep"))return;card.classList.toggle("open")});
    pb.appendChild(card);
  });
  document.getElementById("pw").classList.add("open");
}
function closePanel(){document.getElementById("pw").classList.remove("open");}
buildP1();
</script>
</body>
</html>
